services:
  postgres:
    image: postgres:16-alpine
    container_name: anaya-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anaya_gallery
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anaya_gallery"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
